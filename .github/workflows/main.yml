name: SCM Hybrid AI Engine CI/CD Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: scm_enterprise
          POSTGRES_USER: scm_admin
          POSTGRES_PASSWORD: scm_secure_2026
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y sqlite3 libsqlite3-dev

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scm-agent-system/requirements.txt
        pip install pytest-cov

    - name: Run Core Test Suite with Coverage
      env:
        DB_URL: sqlite:///test_enterprise.db
        ML_API_URL: http://localhost:8000
        MLFLOW_TRACKING_URI: sqlite:///mlflow.db
      run: |
        cd scm-agent-system
        python -m pytest --cov=./ --cov-report=xml --cov-fail-under=80 tests/

    - name: Upload Code Coverage Results
      uses: actions/upload-artifact@v4
      with:
        name: code-coverage-report
        path: scm-agent-system/coverage.xml

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Dry-Run Build ML Serving Image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./scm-agent-system/Dockerfile.api
        push: false
        tags: scm-ml-api:latest

    - name: Dry-Run Build Dashboard Image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./scm-agent-system/Dockerfile
        push: false
        tags: scm-frontend:latest
